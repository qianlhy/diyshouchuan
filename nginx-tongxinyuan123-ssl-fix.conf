# 宝塔 Nginx 参考配置（修复手机/微信小程序 SSL 不可信）
# 用法：在宝塔「配置文件」中对照修改，保存后 nginx -t && nginx -s reload
#
# 常见原因：fullchain.pem 只有域名证书、没有中间证书；或证书 SAN 未包含 www

# ========== 1. 无 www 域名：只做 301 到 www（避免手机访问 tongxinyuan123.com 报证书错）==========
server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name tongxinyuan123.com;

    ssl_certificate     /www/server/panel/vhost/cert/diy-server-1/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/diy-server-1/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://www.tongxinyuan123.com$request_uri;
}

# ========== 2. HTTP：统一跳转到 https://www ==========
server {
    listen 80;
    server_name www.tongxinyuan123.com;
    return 301 https://www.tongxinyuan123.com$request_uri;
}

# ========== 3. HTTPS 主站（小程序 API、管理端）==========
server {
    listen 443 ssl;
    http2 on;
    server_name www.tongxinyuan123.com;

    include /www/server/panel/vhost/nginx/extension/diy-server-1/*.conf;

    access_log /www/wwwlogs/diy-server-1.log;
    error_log  /www/wwwlogs/diy-server-1.error.log;

    # 必须是「完整证书链」：fullchain.pem 里应有 2 段及以上 -----BEGIN CERTIFICATE-----
    ssl_certificate     /www/server/panel/vhost/cert/diy-server-1/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/diy-server-1/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    # 兼容安卓/微信：保留 RSA 套件
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305:HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 可选：OCSP 装订（证书链完整时建议开启）
    # ssl_stapling on;
    # ssl_stapling_verify on;
    # ssl_trusted_certificate /www/server/panel/vhost/cert/diy-server-1/fullchain.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # 不要用 if ($scheme != https) 做跳转（已在独立 80 server 处理）

    location / {
        root /www/wwwroot/backend/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /video/ {
        alias /www/wwwroot/default/;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin *;
    }

    location /user/ {
        proxy_pass http://127.0.0.1:8080/user/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,authentication" always;
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    location ^~ /diy-images/ {
        alias /www/wwwroot/backend/uploads/diy_design/;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=604800" always;
    }

    location ^~ /admin/common/image/ {
        proxy_pass http://127.0.0.1:8080/admin/common/image/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://127.0.0.1:8080/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /notify/ {
        proxy_pass http://127.0.0.1:8080/notify/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ... 其余 location 保持你现有配置即可 ...
}
