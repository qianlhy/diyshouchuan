server:
  port: 8080
  address: 0.0.0.0  # 监听所有网络接口，允许通过局域网IP访问

spring:
  profiles:
    # 默认 prod（宝塔部署）；本地 IDEA 开发请在运行配置里加 Active profiles: dev
    active: prod
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${sky.datasource.driver-class-name}
      url: jdbc:mysql://${sky.datasource.host}:${sky.datasource.port}/${sky.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${sky.datasource.username}
      password: ${sky.datasource.password}
  redis:
    host: ${sky.redis.host}
    port: ${sky.redis.port}
    #password: ${sky.redis.password}
    database:  ${sky.redis.database}
mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.diy.entity
  configuration:
    map-underscore-to-camel-case: true
  #开启驼峰命名

logging:
  level:
    com:
      diy:
        mapper: debug
        service: info
        controller: info
        utils: debug
    org:
      springframework:
        web: debug

diy:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: itcast
    # 设置jwt过期时间
    admin-ttl: 720000000
    # 设置前端传递过来的令牌名称
    admin-token-name: authentication
    user-secret-key: itcast
    user-ttl: 720000000
    user-token-name: authentication
  alioss:
    endpoint: ${sky.alioss.endpoint}
    access-key-id: ${sky.alioss.access-key-id}
    access-key-secret: ${sky.alioss.access-key-secret}
    bucket-name: ${sky.alioss.bucket-name}
  wxcloud:
    storage:
      bucket-name: ${sky.wxcloud.storage.bucket-name}
      region: ${sky.wxcloud.storage.region}
      secret-id: ${sky.wxcloud.storage.secret-id:}
      secret-key: ${sky.wxcloud.storage.secret-key:}
  # 快递100配置
  kuaidi100:
    key: ${sky.kuaidi100.key:AQtFRFEE8459}
    customer: ${sky.kuaidi100.customer:964095869D796B32D82C1FF95E4F8BA0}

